name: Test Merge Rules

on:
  workflow_dispatch: # 只保留手动触发，方便我们现在测试

jobs:
  test_merge:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Minimal Merge Script
      run: |
        cat << 'EOF' > test.py
        import urllib.request
        import os

        list_file = 'rules_list.txt'
        output_file = 'myRewrite.conf'

        if not os.path.exists(list_file):
            print("Error: rules_list.txt not found!")
            exit(1)

        print("--- Start Fetching ---")
        with open(list_file, 'r', encoding='utf-8') as f:
            lines = f.readlines()

        with open(output_file, 'w', encoding='utf-8') as out:
            out.write('; Minimal Test\n')
            
            for line in lines:
                line = line.strip()
                if not line or line.startswith('#'):
                    continue
                try:
                    name, url = line.split(',', 1)
                    print(f"Fetching: {name.strip()}")
                    
                    req = urllib.request.Request(url.strip(), headers={'User-Agent': 'Mozilla/5.0'})
                    with urllib.request.urlopen(req, timeout=10) as response:
                        content = response.read().decode('utf-8')
                        out.write(f"\n; === {name.strip()} ===\n")
                        out.write(content)
                except Exception as e:
                    print(f"Failed to fetch {line}: {e}")

        print("--- Fetching Done ---")
        EOF
        python test.py

    - name: Push to Repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add myRewrite.conf
        git diff --quiet && git diff --staged --quiet || git commit -m "Test automatic update [Skip CI]"
        git push
