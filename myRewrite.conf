        async function fetchGlobalViews() {
            if (!sbClient) return;

            // 查询 counters 表
            const { data, error } = await sbClient
                .from('counters')
                .select('url, views');
                
            if (error) {
                console.error('获取热度失败:', error);
                return;
            }

            if (data) {
                data.forEach(item => {
                    globalViews[item.url] = item.views;
                });
                hasLoadedViews = true;
                if (sortMode === 'hot') {
                    const keyword = document.getElementById('searchInput').value;
                    renderPage();
                    triggerSearchInput(keyword);
                    handleScroll();
                } else {
                    updateDomViews();
                }
            }
        }

        function updateDomViews() {
            document.querySelectorAll('.view-count').forEach(span => {
                const url = span.getAttribute('data-url');
                if (Object.prototype.hasOwnProperty.call(globalViews, url)) {
                    span.innerText = globalViews[url];
                }
            });
        }
        async function trackClick(url) {
            const spans = Array.from(document.querySelectorAll('.view-count')).filter(span => span.dataset.url === url);
            spans.forEach(s => {
                let n = parseInt(s.innerText) || 0;
                s.innerText = n + 1;
                globalViews[url] = n + 1;
            });

            if (!sbClient) return;

            const { error } = await sbClient.rpc('increment_views', { page_url: url });
            
            if (error) {
                console.error('上报失败:', error);
            }
        }

        function updateRunTime() {
            const start = new Date(START_DATE);
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('runTime').innerText = `已稳定运行 ${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        function renderNotices() {
            const list = document.getElementById('noticeList');
            const itemsHtml = NOTICES.map(item => 
                `<li class="notice-item">
                    <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHTML(item.text)}</a>
                </li>`
            ).join('');
            list.innerHTML = itemsHtml + itemsHtml;
            startNoticeTicker(list);
        }

        function startNoticeTicker(list) {
            if (noticeTimer) clearInterval(noticeTimer);

            const itemCount = NOTICES.length;
            const itemHeight = 24;
            let index = 0;
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const transitionMs = reduceMotion ? 0 : 550;

            list.style.transition = `transform ${transitionMs}ms cubic-bezier(.4,0,.2,1)`;
            list.style.transform = 'translateY(0)';

            if (itemCount <= 1) return;

            noticeTimer = setInterval(() => {
                index += 1;
                list.style.transform = `translateY(${-index * itemHeight}px)`;

                if (index === itemCount) {
                    window.setTimeout(() => {
                        list.style.transition = 'none';
                        list.style.transform = 'translateY(0)';
                        index = 0;
                        list.offsetHeight;
                        list.style.transition = `transform ${transitionMs}ms cubic-bezier(.4,0,.2,1)`;
                    }, transitionMs + 20);
                }
            }, 3000);
        }

