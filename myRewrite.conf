.card:focus-visible,.fab-btn:focus-visible,.btn-tool:focus-visible,.tab-btn:focus-visible,.section-sort-btn:focus-visible,.nav-item:focus-visible,.search-bar input:focus-visible{outline:2px solid var(--primary);outline-offset:3px}
@media (hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,.06);border-color:rgba(59,130,246,.3)}
}
.card-media{position:relative;width:36px;height:36px;margin-right:12px;flex-shrink:0}
.card-img{width:36px;height:36px;border-radius:7px;background:var(--bg-body);object-fit:cover;display:block}
.card-rank{position:absolute;left:-5px;bottom:-5px;height:16px;min-width:24px;padding:0 5px;border-radius:999px;background:#2563eb;color:#fff;font-size:10px;font-weight:800;line-height:16px;text-align:center;box-shadow:0 2px 6px rgba(37,99,235,.3)}
.card-rank.rank-1{background:#f59e0b;box-shadow:0 2px 6px rgba(245,158,11,.3)}
.card-rank.rank-2{background:#64748b;box-shadow:0 2px 6px rgba(100,116,139,.28)}
.card-rank.rank-3{background:#b45309;box-shadow:0 2px 6px rgba(180,83,9,.26)}
.card-info{flex:1;min-width:0;overflow:hidden;padding-right:44px;display:flex;flex-direction:column;justify-content:center;gap:2px}
.card-nav .card-info{gap:1px}
.card-title{font-size:.9rem;font-weight:700;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;line-height:1.4}
.card-desc{font-size:.75rem;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;line-height:1.5}
.card-nav .card-title{line-height:1.35}
.card-nav .card-desc{line-height:1.35}
.card-tag{display:inline-block;font-size:11px;padding:0 6px;border-radius:4px;background:rgba(59,130,246,.1);color:var(--primary);font-weight:500;line-height:1.5;width:fit-content;margin:0}
.card-views{position:absolute;top:7px;right:8px;font-size:10px;color:#f59e0b;background:rgba(245,158,11,.1);padding:1px 5px;border-radius:999px;display:flex;align-items:center;gap:2px;line-height:1.4;max-width:64px}
.view-count{font-weight:600}
.section-sort{display:inline-flex;align-items:center;gap:2px;padding:2px;border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.58);flex-shrink:0}
[data-theme=dark] .section-sort{background:rgba(31,41,55,.58)}
.section-sort-btn{height:23px;padding:0 8px;border:0;border-radius:999px;background:transparent;color:var(--text-sub);font-size:.72rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:background-color .2s,color .2s}
.section-sort-btn i{font-size:.86rem}
.section-sort-btn.active{background:rgba(59,130,246,.1);color:var(--primary)}
.card-actions{position:absolute;top:0;right:0;display:none;z-index:10}
.card:hover .card-actions{display:flex}
.action-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:12px}
.btn-edit{background-color:#3b82f6}
.btn-del{background-color:#ef4444;border-bottom-left-radius:6px}
.tab-container{display:flex;background:rgba(0,0,0,.2);border-radius:20px;padding:4px;margin-top:15px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1);position:relative;z-index:10}
.tab-btn{padding:6px 24px;border-radius:16px;color:rgba(255,255,255,.8);font-size:.9rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px;border:none;background:0 0}
.tab-btn.active{background:#fff;color:var(--primary);font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.fab-container{position:fixed;bottom:30px;right:30px;display:flex;flex-direction:column;gap:12px;z-index:100}
.fab-btn{width:44px;height:44px;border-radius:50%;background:var(--bg-card);color:var(--text-sub);border:1px solid var(--border);cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:.2s;transform:translateZ(0);-webkit-transform:translateZ(0);will-change:transform,background-color;transition:transform .2s,background-color .3s,border-color .3s,color .2s}
.fab-btn:hover{transform:scale(1.1);color:var(--primary);border-color:var(--primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:2000;backdrop-filter:blur(3px)}
.modal-box{background:var(--bg-card);width:90%;max-width:400px;padding:24px;border-radius:12px;box-shadow:0 20px 25px -5px rgba(0,0,0,.1)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.85rem;margin-bottom:4px;color:var(--text-sub)}
.form-row input,.form-row select{width:100%;padding:8px 10px;background:var(--bg-body);border:1px solid var(--border);color:var(--text-main);border-radius:6px;font-size:.9rem}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.textarea-export{width:100%;height:150px;padding:10px;background:#1e293b;color:#86efac;border-radius:6px;font-family:monospace;font-size:12px;border:none}
.log-scroll-box{max-height:300px;overflow-y:auto;margin:10px 0;padding-right:5px}
.log-scroll-box::-webkit-scrollbar{width:4px}
.log-scroll-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.log-modal-box{max-width:420px;padding:0;overflow:hidden;border:1px solid rgba(255,255,255,.5)}
.log-modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.log-title{display:flex;align-items:center;gap:9px;color:var(--text-main);font-size:1.05rem;font-weight:800}
.log-title i{color:var(--primary);font-size:1.25rem}
.modal-icon-btn{width:30px;height:30px;border:0;border-radius:50%;background:var(--bg-body);color:var(--text-sub);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:color .2s,background-color .2s,transform .2s}
.modal-icon-btn:hover{color:var(--primary);background:rgba(59,130,246,.1);transform:rotate(90deg)}
.log-scroll-box.log-body{max-height:360px;margin:0;padding:16px 18px 20px;background:linear-gradient(180deg,rgba(59,130,246,.04),transparent 80px)}
.timeline{border-left:1px solid var(--border);margin-left:8px;padding-left:18px}
.timeline-item{position:relative;margin-bottom:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px 12px 12px 14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.timeline-item:last-child{margin-bottom:0}
.timeline-item::before{content:'';position:absolute;left:-24px;top:17px;width:9px;height:9px;border-radius:50%;background:var(--primary);box-shadow:0 0 0 4px rgba(59,130,246,.12);z-index:1}
.timeline-date{font-size:.72rem;color:var(--primary);font-weight:700;margin-bottom:7px;display:inline-flex;align-items:center;background:rgba(59,130,246,.1);padding:2px 7px;border-radius:999px}
.timeline-content{font-size:.9rem;color:var(--text-main);line-height:1.55}
#toast-container{position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast-msg{background:rgba(0,0,0,.85);backdrop-filter:blur(5px);color:#fff;padding:10px 24px;border-radius:50px;font-size:.9rem;box-shadow:0 5px 15px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;white-space:nowrap;opacity:0;animation:toastIn .3s cubic-bezier(.18,.89,.32,1.28) forwards}
.toast-success i{color:#4ade80}
.toast-warn i{color:#facc15}
@keyframes toastIn{to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-20px)}}
@keyframes bellShake{0%,100%{transform:rotate(0)}
10%,30%,50%{transform:rotate(-15deg)}
20%,40%{transform:rotate(15deg)}
60%{transform:rotate(0)}
}
@keyframes spin{from{transform:rotate(0)}
to{transform:rotate(360deg)}
}
.spin-slow{animation:spin 4s linear infinite;display:inline-block;margin-right:4px}
.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:var(--header-h-mobile);z-index:1000;padding:0 20px;align-items:center;justify-content:space-between;transition:all .4s cubic-bezier(.4, 0, .2, 1);color:#fff}
