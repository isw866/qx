        function safeDecode(str) {
            try {
                const key = 123; 
                const decoded = window.atob(str);
                let result = "";
                for (let i = 0; i < decoded.length; i++) {
                    result += String.fromCharCode(decoded.charCodeAt(i) ^ key);
                }
                return result;
            } catch (e) {
                console.error("解密失败", e);
                return "";
            }
        }

