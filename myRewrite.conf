        }

        function copyUrlHref(url) {
            return `javascript:copyLinkAndNotify(${JSON.stringify(url || '')})`;
        }

        function withRefCode(url) {
	    try {
	        const parsed = new URL(url, window.location.href);
	        if (!['http:', 'https:'].includes(parsed.protocol)) return url;
	
	        const refValue = window.location.hostname || 'ddgksf2013.top';
	
	        // 处理 hash 路由，例如：
	        if (parsed.hash && parsed.hash.includes('?')) {
	            const hash = parsed.hash.slice(1);
	            const qIndex = hash.indexOf('?');
	
	            const hashPath = hash.slice(0, qIndex);
	            const hashQuery = hash.slice(qIndex + 1);
	
	            const hashParams = new URLSearchParams(hashQuery);
	            hashParams.set('ref', refValue);
	
	            parsed.hash = `${hashPath}?${hashParams.toString()}`;
	            return parsed.toString();
	        }
	
	        // 普通链接仍然加在正常 query 上
	        parsed.searchParams.set('ref', refValue);
	        return parsed.toString();
	
	    } catch (e) {
	        return url;
	    }
	}

        function getViewCount(url) {
            const value = globalViews[url];
            const count = Number(value);
            return Number.isFinite(count) ? count : 0;
        }

        function getDisplayView(url) {
            if (Object.prototype.hasOwnProperty.call(globalViews, url)) {
                return globalViews[url];
            }
            return hasLoadedViews ? 0 : '...';
        }

        function getRankedItems(items) {
            const ranked = items.map((item, originalIndex) => ({
                item,
                originalIndex,
                viewCount: getViewCount(item.url)
            }));

            if (sortMode !== 'hot' || !hasLoadedViews) return ranked;

            return ranked.sort((a, b) => {
                if (b.viewCount !== a.viewCount) return b.viewCount - a.viewCount;
                return a.originalIndex - b.originalIndex;
            });
        }
        
