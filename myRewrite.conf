        function updateDomViews() {
            document.querySelectorAll('.view-count').forEach(span => {
                const url = span.getAttribute('data-url');
                if (Object.prototype.hasOwnProperty.call(globalViews, url)) {
                    span.innerText = globalViews[url];
                }
            });
        }
        async function trackClick(url) {
            const spans = Array.from(document.querySelectorAll('.view-count')).filter(span => span.dataset.url === url);
            spans.forEach(s => {
                let n = parseInt(s.innerText) || 0;
                s.innerText = n + 1;
                globalViews[url] = n + 1;
            });

            if (!sbClient) return;

            const { error } = await sbClient.rpc('increment_views', { page_url: url });
            
            if (error) {
                console.error('上报失败:', error);
            }
        }

        function updateRunTime() {
            const start = new Date(START_DATE);
            const now = new Date();
            const diff = now - start;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('runTime').innerText = `已稳定运行 ${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        function renderNotices() {
            const list = document.getElementById('noticeList');
            const itemsHtml = NOTICES.map(item => 
                `<li class="notice-item">
                    <a href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHTML(item.text)}</a>
                </li>`
            ).join('');
            list.innerHTML = itemsHtml + itemsHtml;
            startNoticeTicker(list);
        }

        function startNoticeTicker(list) {
            if (noticeTimer) clearInterval(noticeTimer);

            const itemCount = NOTICES.length;
            const itemHeight = 24;
            let index = 0;
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const transitionMs = reduceMotion ? 0 : 550;

            list.style.transition = `transform ${transitionMs}ms cubic-bezier(.4,0,.2,1)`;
            list.style.transform = 'translateY(0)';

            if (itemCount <= 1) return;

            noticeTimer = setInterval(() => {
                index += 1;
                list.style.transform = `translateY(${-index * itemHeight}px)`;

                if (index === itemCount) {
                    window.setTimeout(() => {
                        list.style.transition = 'none';
                        list.style.transform = 'translateY(0)';
                        index = 0;
                        list.offsetHeight;
                        list.style.transition = `transform ${transitionMs}ms cubic-bezier(.4,0,.2,1)`;
                    }, transitionMs + 20);
                }
            }, 3000);
        }

        function saveDB() {
            if(MODE === 'DEV') localStorage.setItem('navDB_v5', JSON.stringify(db));
        }
        let currentMode = 'nav'; 
        let sortMode = 'default';

        function switchSortMode(mode) {
            if (!['default', 'hot'].includes(mode) || sortMode === mode) return;

            sortMode = mode;
            const keyword = document.getElementById('searchInput').value;
            renderPage();
            triggerSearchInput(keyword);
            handleScroll();

            if (mode === 'hot' && !hasLoadedViews) {
                showToast('热度加载中，稍后自动排行', 'warn');
            }
        }

        function switchTab(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            
            if (mode === 'nav') {
                db = (MODE === 'DEV' && localStorage.getItem('navDB_v5')) ? JSON.parse(localStorage.getItem('navDB_v5')) : initialData;
                document.getElementById('searchInput').placeholder = "搜索网站...";
                document.getElementById('searchInput').value = ""; // 清空搜索框
                renderPage();
                resetScroll();
            } else {
                document.getElementById('searchInput').placeholder = "搜索脚本...";
                document.getElementById('searchInput').value = ""; // 清空搜索框
                
                if (qxData.length > 0) {
                    db = qxData;
                    renderPage();
                    resetScroll();
                } else {
                    fetch('./data.json')
                        .then(response => {
                            if (!response.ok) throw new Error("加载失败");
                            return response.json();
                        })
                        .then(data => {
                            qxData = data; // 存入缓存
                            db = qxData;   // 切换当前数据源
                            renderPage();  // 渲染页面
                            resetScroll();
                            showToast('脚本加载成功', 'success');
                        })
                        .catch(err => {
                            console.error(err);
                            showToast('无法加载 data.json，请检查路径', 'warn');
                        });
                }
            }
        }

        function resetScroll() {
            if(window.innerWidth < 768) window.scrollTo({top: 0, behavior: 'smooth'});
            else document.getElementById('mainViewport').scrollTo({top:0}); 
        }
		function copyLinkAndNotify(url) {
			const input = document.createElement('textarea');
			input.value = url;
			document.body.appendChild(input);
			input.select();
			try {
				document.execCommand('copy');
				showToast('已复制链接到剪贴板', 'success'); 
			} catch (e) {
				showToast('复制失败，请手动复制', 'warn');
			}
			document.body.removeChild(input);
		}
		
		function generateQxLink(item, type, gory) {
			const author = item.author || "ddgksf2013";
			const fullTag = item.author ? `${item.name}${gory}@${item.author}` : item.name;
			const opt = item.opt_parser ? item.opt_parser : "false";
			const safeType = type || "2";

			if (safeType === "1") {
				return copyUrlHref(item.url);
			}

			if (safeType === "2") {
				
				if (Lock == 1) {
					const configStr = `${item.url}, tag=${fullTag}, update-interval=86400, opt-parser=${opt}, enabled=true`;
					const jsonPayload = { "rewrite_remote": [ configStr ] };
					const encodedPayload = encodeURIComponent(JSON.stringify(jsonPayload));
					return `https://quantumult.app/x/open-app/add-resource?remote-resource=${encodedPayload}`;
				}
				
				else if (Lock == 2) {
					const tUrl = item.url;
					const srcType = tUrl.indexOf(".sgmodule") !== -1 ? "surge-module" : "qx-rewrite";
					
					const fName = tUrl.substring(tUrl.lastIndexOf('/') + 1).replace(/\.(conf|js|snippet|sgmodule)(\?.*)?$/, "") + ".sgmodule";
					const base = "http://script.hub/file/_start_/" + tUrl + "/_end_/" + fName;
					
					const paramsCommon = "?type=" + srcType + "&n=" + encodeURIComponent(fullTag) + "+" + encodeURIComponent(item.desc || '') + "&headers=User-Agent:surge&del=true&jqEnabled=true";
					
					const sParams = paramsCommon + `&target=surge-module&category=${item.author}`;
					const sLinkRaw = "surge:///install-module?url=" + base + encodeURIComponent(sParams);
					
					return sLinkRaw;
				}
				
				else if(Lock == 3) {
					const tUrl = item.url;
					const srcType = tUrl.indexOf(".sgmodule") !== -1 ? "surge-module" : "qx-rewrite";
					
					const fName = tUrl.substring(tUrl.lastIndexOf('/') + 1).replace(/\.(conf|js|snippet|sgmodule)(\?.*)?$/, "") + ".sgmodule";
					const base = "http://script.hub/file/_start_/" + tUrl + "/_end_/" + fName;
					
					const paramsCommon = "?type=" + srcType + "&n=" + encodeURIComponent(fullTag) + "+" + encodeURIComponent(item.desc || '') + "&headers=User-Agent:surge&del=true&jqEnabled=true";
					
					const rParams = paramsCommon + `&target=shadowrocket-module&category=${item.author}`;
					const rLink = "shadowrocket://install?module=" + base + encodeURIComponent(rParams);
					
					return rLink;
				}
				else if(Lock == 4) {
					const tUrl = item.url;
					const srcType = tUrl.indexOf(".sgmodule") !== -1 ? "surge-module" : "qx-rewrite";
					
					const fName = tUrl.substring(tUrl.lastIndexOf('/') + 1).replace(/\.(conf|js|snippet|sgmodule)(\?.*)?$/, "") + ".sgmodule";
					const base = "http://script.hub/file/_start_/" + tUrl + "/_end_/" + fName;
					
					const paramsCommon = "?type=" + srcType + "&n=" + encodeURIComponent(fullTag) + "+" + encodeURIComponent(item.desc || '') + "&headers=User-Agent:surge&del=true&jqEnabled=true";
					
					const rParams = paramsCommon + `&target=loon-plugin&category=${item.author}`;
					const rLink = "loon://import?plugin=" + base + encodeURIComponent(rParams);
					
					return rLink;
				}
				else {
					const tUrl = item.url;
					const srcType = tUrl.indexOf(".sgmodule") !== -1 ? "surge-module" : "qx-rewrite";
					
					const fName = tUrl.substring(tUrl.lastIndexOf('/') + 1).replace(/\.(conf|js|snippet|sgmodule)(\?.*)?$/, "") + ".sgmodule";
					const base = "http://script.hub/file/_start_/" + tUrl + "/_end_/" + fName;
					
					const paramsCommon = "?type=" + srcType + "&n=" + encodeURIComponent(fullTag) + "+" + encodeURIComponent(item.desc || '') + "&headers=User-Agent:surge&del=true&jqEnabled=true";
					
					const sParams = paramsCommon + `&target=surge-module&category=${item.author}`;
					const sLinkRaw = "egern:///modules/new?url=" + base + encodeURIComponent(sParams);
					
					return sLinkRaw;
				}
			} 
			
			else if (safeType === "4") {
				const jsonPayload = [item.url];
				const encodedPayload = encodeURIComponent(JSON.stringify(jsonPayload));
				return `https://quantumult.app/x/open-app/ui?module=gallery&type=icon&action=add&content=${encodedPayload}`;
			}
			
			return copyUrlHref(item.url);
		}
		
        function renderPage() {
            const nav = document.getElementById('navMenu');
            const main = document.getElementById('contentArea');
            const catSelect = document.getElementById('catSelect'); 

            let navHtml = '';
            let mainHtml = '';
            let selectHtml = '';

            db.forEach((cat, idx) => {
                let defaultIcon = currentMode === 'nav' ? "ri-folder-line" : "ri-code-box-line";
                const iconClass = CAT_ICONS[cat.category] || defaultIcon;
                
                const currentCatType = cat.catetype || "2";
                const currentCatgory = cat.category;
                
                navHtml += `<button class="nav-item" type="button" onclick="scrollToCat(${idx})" id="nav-${idx}">
                                <i class="${escapeAttr(iconClass)}" aria-hidden="true"></i> ${escapeHTML(cat.category)}
                            </button>`;
                
                const rankedItems = getRankedItems(cat.items);
                const sortControlHtml = idx === 0 ? `
                    <div class="section-sort" role="group" aria-label="排序方式">
                        <button type="button" class="section-sort-btn ${sortMode === 'default' ? 'active' : ''}" onclick="switchSortMode('default')" aria-pressed="${sortMode === 'default'}">
                            <i class="ri-list-check-2"></i>默认
                        </button>
                        <button type="button" class="section-sort-btn ${sortMode === 'hot' ? 'active' : ''}" onclick="switchSortMode('hot')" aria-pressed="${sortMode === 'hot'}">
                            <i class="ri-fire-line"></i>热度
                        </button>
                    </div>
                ` : '';

                mainHtml += `
                    <div id="cat-${idx}" style="scroll-margin-top: 80px;">
                        <div class="section-header">
                            <span class="section-title">${escapeHTML(cat.category)}</span>
                            ${sortControlHtml}
                        </div>
                        <div class="grid-box">
                            ${rankedItems.map(({ item, originalIndex }, rankedIndex) => {
                                let finalUrl = '';
                                let iconSrc = '';
                                
                                if (currentMode === 'nav') {
                                    iconSrc = item.icon ? item.icon : `https://www.google.com/s2/favicons?domain=${encodeURIComponent(item.url || '')}&sz=64`;
                                    finalUrl = withRefCode(item.url);
                                } else {
                                    iconSrc = item.icon || "";
                                    finalUrl = generateQxLink(item, currentCatType, currentCatgory);
                                }

                                const viewNum = getDisplayView(item.url);
                                const rankNum = sortMode === 'hot' && hasLoadedViews && rankedIndex < 3 ? rankedIndex + 1 : null;
                                
                                return `
                                <a href="${escapeAttr(finalUrl)}" ${currentMode === 'nav' ? 'target="_blank" rel="noopener noreferrer"' : ''} class="card card-${currentMode}" data-url="${escapeAttr(item.url)}" onclick="trackClick(this.dataset.url)" aria-label="${escapeAttr(`${item.name}，${item.desc || '暂无描述'}`)}">
                                    <div class="card-media">
                                        <img src="${escapeAttr(iconSrc)}" class="card-img" loading="lazy" width="36" height="36" alt="${escapeAttr(item.name)} 图标" onerror="this.onerror=null;this.src='favicon-96x96.png';">
                                        ${rankNum ? `<span class="card-rank rank-${rankNum}">#${rankNum}</span>` : ''}
                                    </div>
                                    
                                    <div class="card-info">
                                        <div class="card-title">${escapeHTML(item.name)}</div>
                                        
                                        ${currentMode === 'qx' ? `<div class="card-tag">${escapeHTML(item.author || 'ddgksf2013')}</div>` : ''}
                                        
                                        <div class="card-desc">${escapeHTML(item.desc || '暂无描述')}</div>
                                    </div>
                                    
                                    <div class="card-views">
                                        <i class="ri-fire-line"></i> 
                                        <span class="view-count" data-url="${escapeAttr(item.url)}">${escapeHTML(viewNum)}</span>
                                    </div>

                                    ${MODE === 'DEV' ? `
                                    <div class="card-actions">
                                        <div class="action-btn btn-edit" onclick="openEditModal(${idx}, ${originalIndex}, event)"><i class="ri-pencil-line"></i></div>
                                        <div class="action-btn btn-del" onclick="delItem(${idx}, ${originalIndex}, event)"><i class="ri-close-line"></i></div>
                                    </div>` : ''}
                                </a>
                            `}).join('')}
                        </div>
                    </div>
                `;
                if(catSelect) selectHtml += `<option value="${idx}">${escapeHTML(cat.category)}</option>`;
            });

            nav.innerHTML = navHtml;
            main.innerHTML = mainHtml;
            if(catSelect) catSelect.innerHTML = selectHtml;
            
            updateDomViews();
        }

        const mainViewport = document.getElementById('mainViewport');
        const mobileHeader = document.getElementById('mobileHeader');
        let scrollTicking = false;

		function updateScrollState() {
            const isMobile = window.innerWidth < 768;
			let scrollTop, scrollHeight, clientHeight;
			
			if (isMobile) {
				scrollTop = window.scrollY || document.documentElement.scrollTop;
				scrollHeight = document.documentElement.scrollHeight;
				clientHeight = document.documentElement.clientHeight;
			} else {
				scrollTop = mainViewport.scrollTop;
				scrollHeight = mainViewport.scrollHeight;
				clientHeight = mainViewport.clientHeight;
			}

			let cur = 0;
			db.forEach((_, i) => {
				const el = document.getElementById(`cat-${i}`);
				if(el && el.getBoundingClientRect().top < 200) cur = i;
			});
			document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
			const active = document.getElementById(`nav-${cur}`);
			if(active) active.classList.add('active');

			if(isMobile) {
				if(scrollTop > 50) {
					mobileHeader.classList.add('scrolled');
				} else {
					mobileHeader.classList.remove('scrolled');
				}
			} else {
                mobileHeader.classList.remove('scrolled');
            }

            const maxScroll = scrollHeight - clientHeight;
			let scrollPercent = maxScroll > 0 ? scrollTop / maxScroll : 0;
			if (scrollPercent > 1) scrollPercent = 1;
			if (scrollPercent < 0) scrollPercent = 0;
			
			setProgress(scrollPercent);
			scrollTicking = false;
		}

        function handleScroll() {
            if (!scrollTicking) {
                window.requestAnimationFrame(updateScrollState);
                scrollTicking = true;
            }
        }

		window.addEventListener('scroll', handleScroll, { passive: true });
        mainViewport.addEventListener('scroll', handleScroll, { passive: true });
        window.addEventListener('resize', handleScroll, { passive: true });

        function scrollToTop() { 
            if(window.innerWidth < 768) {
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                document.getElementById('mainViewport').scrollTo({top:0, behavior:'smooth'}); 
            }
        }

        function openAddModal() {
            editState = null; 
            document.getElementById('modalTitle').innerText = "添加新资源";
            document.getElementById('catGroup').style.display = 'block';
            document.getElementById('editModal').style.display = 'flex';
            document.querySelector('form').reset();
            isNewCat = false; toggleNewCatUI();
        }

        function openEditModal(cIdx, iIdx, e) {
            e.preventDefault(); e.stopPropagation();
            editState = { cIdx, iIdx };
            const item = db[cIdx].items[iIdx];
            document.getElementById('modalTitle').innerText = "编辑资源";
            document.getElementById('catGroup').style.display = 'none';
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemUrl').value = item.url;
            document.getElementById('itemDesc').value = item.desc || '';
            document.getElementById('itemIcon').value = item.icon || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function saveItem(e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const url = document.getElementById('itemUrl').value;
            const desc = document.getElementById('itemDesc').value;
            const icon = document.getElementById('itemIcon').value;
            const newItem = { name, url, desc, icon };

            if (editState) {
                db[editState.cIdx].items[editState.iIdx] = newItem;
            } else {
                let catIdx;
                if (isNewCat) {
                    const newCatName = document.getElementById('newCatInput').value.trim();
                    if(!newCatName) return alert('请输入分类名');
                    db.push({ category: newCatName, items: [] });
                    catIdx = db.length - 1;
                } else {
                    catIdx = document.getElementById('catSelect').value;
                }
                db[catIdx].items.push(newItem);
            }
            saveDB(); renderPage(); closeModal('editModal');
        }

        function delItem(cIdx, iIdx, e) {
            e.preventDefault(); e.stopPropagation();
            if(confirm('确认删除此项吗？')) {
                db[cIdx].items.splice(iIdx, 1);
                saveDB(); renderPage();
            }
        }

        function toggleNewCat() { isNewCat = !isNewCat; toggleNewCatUI(); }
        function toggleNewCatUI() {
            const sel = document.getElementById('catSelect');
            const inp = document.getElementById('newCatInput');
            const txt = document.getElementById('catToggleText');
            if(isNewCat) { sel.style.display = 'none'; inp.style.display = 'block'; txt.innerText = '选已有?'; }
            else { sel.style.display = 'block'; inp.style.display = 'none'; txt.innerText = '新建?'; }
        }

        function closeModal(id) { 
			document.getElementById(id).style.display = 'none'; 
			document.body.style.overflow = '';
			}
        
        function toggleTheme() {
			const html = document.documentElement; // 获取 html 标签
			const meta = document.getElementById('themeColorMeta'); 
			
			if(html.hasAttribute('data-theme')) {
				html.removeAttribute('data-theme');
				localStorage.setItem('theme', 'light');
				document.getElementById('themeIcon').className = 'ri-moon-line';
				if(meta) meta.content = "#f0f2f5"; 
			} else {
				html.setAttribute('data-theme', 'dark');
				localStorage.setItem('theme', 'dark');
				document.getElementById('themeIcon').className = 'ri-sun-line';
				if(meta) meta.content = "#111827"; 
			}
		}
        
        function scrollToCat(idx) {
            document.getElementById(`cat-${idx}`).scrollIntoView({behavior:'smooth'});
            if(window.innerWidth<768) toggleSidebar();
        }

        function openLogModal() {
            const container = document.getElementById('logContent');
            
            const html = CHANGE_LOGS.map(log => `
                <div class="timeline-item">
                    <div class="timeline-date">${log.date}</div>
                    <div class="timeline-content">${log.content}</div>
                </div>
            `).join('');

            container.innerHTML = `<div class="timeline">${html}</div>`;
            
            document.getElementById('logModal').style.display = 'flex';
			document.body.style.overflow = 'hidden';
        }
        
        function toggleSidebar() { 
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sb.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        function openExportModal() {
            document.getElementById('exportArea').value = JSON.stringify(db, null, 4);
            document.getElementById('exportModal').style.display = 'flex';
        }
        function copyCode() {
            document.getElementById('exportArea').select();
            document.execCommand('copy');
            alert('已复制');
        }

        init();
    </script>
